<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- User Node Gradient -->
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <!-- Container Node Gradient (Web App) -->
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>

    <!-- Container Node Gradient (Database) -->
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <dropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" stroke-opacity="0.3" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)" />
  <rect width="900" height="600" fill="url(#grid)" />

  <!-- Boundary Box for System -->
  <rect x="270" y="110" width="580" height="420" rx="16" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="8,6" />
  <text x="290" y="138" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="700" fill="#94a3b8" letter-spacing="1">MVP APPLICATION SYSTEM BOUNDARY</text>

  <!-- Diagram Title -->
  <text x="40" y="50" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">C4 Model - Level 2: Container Diagram</text>
  <text x="40" y="75" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8">Shows the internal containers (Web App &amp; Database) and their interaction protocols</text>

  <!-- USER NODE -->
  <g transform="translate(50, 240)" filter="url(#dropShadow)">
    <rect width="160" height="120" rx="12" fill="url(#userGrad)" stroke="#60a5fa" stroke-width="1.5" />
    <!-- User Icon -->
    <circle cx="80" cy="40" r="16" fill="#eff6ff" />
    <path d="M 60 75 Q 80 55 100 75 Z" fill="#eff6ff" />
    <text x="80" y="88" font-family="'Outfit', 'Inter', sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">End User</text>
    <text x="80" y="104" font-family="'Inter', sans-serif" font-size="11" fill="#bfdbfe" text-anchor="middle">[Person] Browser interface</text>
  </g>

  <!-- RELATION: USER -> WEB CONTAINER -->
  <g>
    <path d="M 215 300 L 325 300" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-dasharray="6,4" />
    <polygon points="335,300 320,293 320,307" fill="#60a5fa" />
    <rect x="230" y="260" width="90" height="26" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="275" y="277" font-family="'Inter', sans-serif" font-size="10" fill="#38bdf8" text-anchor="middle" font-weight="500">HTTPS (REST)</text>
  </g>

  <!-- WEB APP CONTAINER (Flask + Static) -->
  <g transform="translate(340, 210)" filter="url(#dropShadow)">
    <rect width="200" height="180" rx="12" fill="url(#webGrad)" stroke="#c084fc" stroke-width="1.5" />
    <!-- Tech Label -->
    <rect x="15" y="15" width="70" height="18" rx="3" fill="#581c87" stroke="#a855f7" stroke-width="1" />
    <text x="50" y="27" font-family="'Inter', sans-serif" font-size="9" fill="#f3e8ff" text-anchor="middle" font-weight="600">FLASK APP</text>
    
    <text x="100" y="70" font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Web Application</text>
    <text x="100" y="92" font-family="'Inter', sans-serif" font-size="11" fill="#e9d5ff" text-anchor="middle">Python / Flask &amp; CSS</text>
    
    <text x="10" y="125" font-family="'Inter', sans-serif" font-size="10.5" fill="#f3e8ff" width="180">
      <tspan x="15" dy="0">Delivers beautiful dashboard</tspan>
      <tspan x="15" dy="16">UI and implements parameter-</tspan>
      <tspan x="15" dy="16">bound SQL API endpoints.</tspan>
    </text>
  </g>

  <!-- RELATION: WEB APP -> DATABASE -->
  <g>
    <path d="M 545 300 L 615 300" fill="none" stroke="#c084fc" stroke-width="2.5" />
    <polygon points="625,300 610,293 610,307" fill="#c084fc" />
    <rect x="550" y="260" width="70" height="26" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="585" y="277" font-family="'Inter', sans-serif" font-size="10" fill="#e9d5ff" text-anchor="middle" font-weight="500">SQL (5432)</text>
  </g>

  <!-- DATABASE CONTAINER (PostgreSQL) -->
  <g transform="translate(630, 210)" filter="url(#dropShadow)">
    <rect width="180" height="180" rx="12" fill="url(#dbGrad)" stroke="#34d399" stroke-width="1.5" />
    <!-- Tech Label -->
    <rect x="15" y="15" width="75" height="18" rx="3" fill="#064e3b" stroke="#059669" stroke-width="1" />
    <text x="52" y="27" font-family="'Inter', sans-serif" font-size="9" fill="#ecfdf5" text-anchor="middle" font-weight="600">POSTGRESQL</text>

    <!-- DB Cylinder Icon -->
    <ellipse cx="90" cy="55" rx="22" ry="7" fill="none" stroke="#ecfdf5" stroke-width="2" />
    <path d="M 68 55 L 68 75 A 22 7 0 0 0 112 75 L 112 55" fill="none" stroke="#ecfdf5" stroke-width="2" />
    <path d="M 68 75 L 68 95 A 22 7 0 0 0 112 95 L 112 75" fill="none" stroke="#ecfdf5" stroke-width="2" />

    <text x="90" y="120" font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Database</text>
    <text x="90" y="138" font-family="'Inter', sans-serif" font-size="11" fill="#a7f3d0" text-anchor="middle">[Relational Database]</text>
    <text x="90" y="155" font-family="'Inter', sans-serif" font-size="10.5" fill="#a7f3d0" text-anchor="middle">Stores project data securely</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 540)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#3b82f6" />
    <text x="20" y="11" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8">User</text>
    
    <rect x="80" y="0" width="12" height="12" rx="2" fill="#8b5cf6" />
    <text x="100" y="11" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8">Web App Container</text>

    <rect x="230" y="0" width="12" height="12" rx="2" fill="#10b981" />
    <text x="250" y="11" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8">Database Container</text>
  </g>
</svg>