<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- User Node Gradient -->
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <!-- System Node Gradient -->
    <linearGradient id="systemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    
    <!-- External Node Gradient -->
    <linearGradient id="externalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <dropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" stroke-opacity="0.3" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#grid)" />

  <!-- Diagram Title -->
  <text x="40" y="50" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">C4 Model - Level 1: System Context</text>
  <text x="40" y="75" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#94a3b8">Shows the system boundaries and how the user interacts with the MVP Application</text>

  <!-- USER NODE -->
  <g transform="translate(100, 200)" filter="url(#dropShadow)">
    <rect width="180" height="120" rx="12" fill="url(#userGrad)" stroke="#60a5fa" stroke-width="1.5" />
    <!-- User Icon -->
    <circle cx="90" cy="40" r="16" fill="#eff6ff" />
    <path d="M 70 75 Q 90 55 110 75 Z" fill="#eff6ff" />
    <text x="90" y="88" font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">End User</text>
    <text x="90" y="104" font-family="'Inter', sans-serif" font-size="11" fill="#bfdbfe" text-anchor="middle">[Person] Uses the web app</text>
  </g>

  <!-- RELATION: USER -> SYSTEM -->
  <g>
    <!-- Arrow Line -->
    <path d="M 285 260 L 485 260" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-dasharray="6,4" />
    <polygon points="495,260 480,253 480,267" fill="#60a5fa" />
    <!-- Label -->
    <rect x="315" y="235" width="120" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="375" y="250" font-family="'Inter', sans-serif" font-size="11" fill="#38bdf8" text-anchor="middle" font-weight="500">Uses (HTTP/REST)</text>
  </g>

  <!-- MVP SYSTEM NODE -->
  <g transform="translate(500, 200)" filter="url(#dropShadow)">
    <rect width="200" height="120" rx="12" fill="url(#systemGrad)" stroke="#c084fc" stroke-width="1.5" />
    <!-- System Symbol -->
    <rect x="85" y="25" width="30" height="25" rx="3" fill="none" stroke="#faf5ff" stroke-width="2" />
    <line x1="85" y1="37" x2="115" y2="37" stroke="#faf5ff" stroke-width="2" />
    <line x1="97" y1="25" x2="97" y2="50" stroke="#faf5ff" stroke-width="2" />
    <text x="100" y="78" font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">MVP Application</text>
    <text x="100" y="96" font-family="'Inter', sans-serif" font-size="11" fill="#e9d5ff" text-anchor="middle">[Software System]</text>
    <text x="100" y="108" font-family="'Inter', sans-serif" font-size="10" fill="#d8b4fe" text-anchor="middle">Provides core features</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 440)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#3b82f6" />
    <text x="20" y="11" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8">User</text>
    
    <rect x="80" y="0" width="12" height="12" rx="2" fill="#8b5cf6" />
    <text x="100" y="11" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8">System Boundary</text>
  </g>
</svg>